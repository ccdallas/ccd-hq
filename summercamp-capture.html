<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Summer Camp — Lead Capture</title>
<meta name="theme-color" content="#0E1613">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Leads">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#1E5040; --amber:#E0A83E; --crimson:#8B1E24;
    --cream:#F3ECDD; --slate:#3D4142;
    --bg:#0E1613; --bg2:#16211C; --card:#182620; --line:#243530;
    --muted:#8FA098; --muted2:#6E7E77;
    --t-fte:#E0A83E; --t-contract:#3E9E7E; --t-brand:#C7B27E;
    --t-peer:#6E9088; --t-vendor:#7A756B;
    --display:'Cormorant Garamond',Georgia,serif;
    --body:'DM Sans',system-ui,sans-serif;
    --mono:'DM Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--cream);font-family:var(--body)}
  body{padding:0 16px calc(120px + env(safe-area-inset-bottom)) 16px;max-width:560px;margin:0 auto;
       padding-top:calc(14px + env(safe-area-inset-top))}
  ::selection{background:var(--amber);color:#1a1200}

  /* Header */
  .head{padding:6px 2px 10px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;color:var(--amber);
           text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
  .count{background:var(--amber);color:#1a1200;border-radius:999px;padding:3px 10px;
         font-weight:500;letter-spacing:.05em;font-size:12px}
  .name{font-family:var(--display);font-size:30px;font-weight:600;letter-spacing:.01em;
        margin:6px 0 2px;line-height:1}
  .sub{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;color:var(--muted2);
       text-transform:uppercase}
  .ecg{width:100%;height:26px;margin:8px 0 2px;display:block}

  /* Form */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  label.fl{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.16em;
           text-transform:uppercase;color:var(--muted);margin:0 0 6px 2px}
  input.txt{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;
            color:var(--cream);font-family:var(--body);font-size:17px;padding:13px 14px;outline:none}
  input.txt:focus{border-color:var(--amber)}
  input.txt::placeholder{color:var(--muted2)}
  .field{margin-bottom:12px}

  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{border:1px solid var(--line);background:transparent;color:var(--muted);
        font-family:var(--body);font-size:13.5px;font-weight:500;padding:9px 13px;border-radius:999px;
        cursor:pointer;transition:.12s;line-height:1}
  .chip:active{transform:scale(.96)}
  .chip[data-on="1"]{color:#0E1613;font-weight:700}
  .chip.where[data-on="1"]{background:var(--cream);border-color:var(--cream);color:#0E1613}
  .chip.type[data-on="1"]{border-color:transparent}
  .chip.type[data-t="FTE"][data-on="1"]{background:var(--t-fte)}
  .chip.type[data-t="Contract"][data-on="1"]{background:var(--t-contract)}
  .chip.type[data-t="Brand"][data-on="1"]{background:var(--t-brand)}
  .chip.type[data-t="Peer"][data-on="1"]{background:var(--t-peer)}
  .chip.type[data-t="Vendor"][data-on="1"]{background:var(--t-vendor)}

  .row{display:flex;gap:10px;align-items:center;margin-top:4px}
  .hot{flex:0 0 auto;display:flex;align-items:center;gap:7px;border:1px solid var(--line);
       background:var(--bg2);border-radius:10px;padding:12px 14px;cursor:pointer;color:var(--muted);
       font-size:13.5px;font-weight:500;font-family:var(--body)}
  .hot[data-on="1"]{border-color:var(--cream);color:var(--cream)}
  .hot .star{font-size:16px;line-height:1}
  .save{flex:1;background:var(--amber);color:#1a1200;border:none;border-radius:10px;
        font-family:var(--body);font-weight:700;font-size:16px;padding:15px;cursor:pointer;letter-spacing:.01em}
  .save:active{transform:scale(.99);filter:brightness(1.05)}
  .save.edit{background:var(--t-contract);color:#04140e}
  .cancel{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:10px;
          padding:0 16px;font-family:var(--body);font-size:14px;cursor:pointer}

  /* List */
  .listhead{display:flex;justify-content:space-between;align-items:baseline;margin:22px 2px 10px}
  .listhead h2{font-family:var(--display);font-size:22px;font-weight:600;margin:0}
  .filters{display:flex;gap:7px;overflow-x:auto;padding:2px 0 8px;margin:0 -16px;padding-left:16px;
           padding-right:16px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .fchip{flex:0 0 auto;border:1px solid var(--line);background:transparent;color:var(--muted);
         font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
         padding:8px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .fchip[data-on="1"]{background:var(--cream);color:#0E1613;border-color:var(--cream)}

  .lead{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 14px;
        margin-bottom:9px;position:relative;border-left:3px solid var(--line)}
  .lead[data-t="FTE"]{border-left-color:var(--t-fte)}
  .lead[data-t="Contract"]{border-left-color:var(--t-contract)}
  .lead[data-t="Brand"]{border-left-color:var(--t-brand)}
  .lead[data-t="Peer"]{border-left-color:var(--t-peer)}
  .lead[data-t="Vendor"]{border-left-color:var(--t-vendor)}
  .lead .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .lead .nm{font-family:var(--display);font-size:20px;font-weight:600;line-height:1.05}
  .lead .co{color:var(--muted);font-size:14px;margin-top:1px}
  .lead .note{font-size:14.5px;color:var(--cream);margin-top:8px;line-height:1.4;opacity:.92}
  .lead .meta{display:flex;gap:8px;align-items:center;margin-top:9px;flex-wrap:wrap}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
       padding:3px 8px;border-radius:6px;color:#0E1613;font-weight:500}
  .tag[data-t="FTE"]{background:var(--t-fte)} .tag[data-t="Contract"]{background:var(--t-contract)}
  .tag[data-t="Brand"]{background:var(--t-brand)} .tag[data-t="Peer"]{background:var(--t-peer)}
  .tag[data-t="Vendor"]{background:var(--t-vendor)}
  .where-tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
             color:var(--muted2)}
  .starmark{color:var(--cream);font-size:15px}
  .del{position:absolute;top:10px;right:12px;background:transparent;border:none;color:var(--muted2);
       font-size:18px;cursor:pointer;padding:4px;line-height:1}
  .del:active{color:var(--crimson)}
  .empty{text-align:center;color:var(--muted2);padding:36px 20px;font-size:14.5px;line-height:1.6}
  .empty b{color:var(--muted);font-weight:500}

  /* Export bar */
  .exportbar{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(to top,var(--bg) 62%,transparent);
             padding:14px 16px calc(16px + env(safe-area-inset-bottom));display:flex;gap:9px;
             max-width:560px;margin:0 auto}
  .exportbar button{flex:1;border-radius:11px;font-family:var(--body);font-weight:700;font-size:14px;
                    padding:14px 8px;cursor:pointer;border:1px solid var(--line)}
  .ex-copy{background:var(--green);color:var(--cream);border-color:var(--green)}
  .ex-csv{background:transparent;color:var(--muted)}
  .toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:96px;
         background:var(--cream);color:#0E1613;font-weight:600;font-size:13.5px;padding:11px 18px;
         border-radius:999px;opacity:0;pointer-events:none;transition:.25s;z-index:20}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="head">
    <div class="eyebrow"><span>Summer Camp 2026 · Lead Capture</span><span class="count" id="count">0</span></div>
    <div class="name">Chaunda C. Dallas, MSIT</div>
    <div class="sub">Black Hat · DEF CON — who did I meet</div>
    <svg class="ecg" viewBox="0 0 560 26" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0 13 H210 l7 -3 l6 6 l7 -10 l6 20 l7 -13 H560" fill="none" stroke="#8B1E24" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="card">
    <div class="field">
      <label class="fl" for="in-name">Name</label>
      <input class="txt" id="in-name" placeholder="Who did you just meet?" autocomplete="off">
    </div>
    <div class="field">
      <label class="fl" for="in-co">Company / role</label>
      <input class="txt" id="in-co" placeholder="e.g. Fortified Health — VP Security" autocomplete="off">
    </div>
    <div class="field">
      <label class="fl">Where</label>
      <div class="chips" id="where"></div>
    </div>
    <div class="field">
      <label class="fl">Type</label>
      <div class="chips" id="type"></div>
    </div>
    <div class="field">
      <label class="fl" for="in-note">The one thing to follow up on</label>
      <input class="txt" id="in-note" placeholder="Wants the DFR deck / intro to X / hiring Q3…" autocomplete="off">
    </div>
    <div class="row">
      <button class="hot" id="hot" data-on="0"><span class="star">☆</span><span>Hot</span></button>
      <button class="save" id="save">Log it</button>
      <button class="cancel" id="cancel" style="display:none">Cancel</button>
    </div>
  </div>

  <div class="listhead"><h2 id="lh">Logged</h2></div>
  <div class="filters" id="filters"></div>
  <div id="list"></div>

  <div class="exportbar">
    <button class="ex-copy" id="copyBtn">Copy for follow-up</button>
    <button class="ex-csv" id="csvBtn">Download CSV</button>
  </div>
  <div class="toast" id="toast"></div>

<script>
(function(){
  const KEY='ccd_summercamp_leads_v1';
  const WHERES=['Black Hat','DEF CON','Party','Other'];
  const TYPES=[['FTE','FTE lead'],['Contract','Contract'],['Brand','Brand·Press'],['Peer','Peer·Mentor'],['Vendor','Vendor']];
  const TYPELABEL={FTE:'FTE lead',Contract:'Contract',Brand:'Brand·Press',Peer:'Peer·Mentor',Vendor:'Vendor'};
  const $=s=>document.querySelector(s);
  let leads=load(), filter='All', editId=null;
  let sel={where:'Black Hat', type:'FTE', hot:false};

  function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
  function save(){localStorage.setItem(KEY,JSON.stringify(leads))}

  // build chip rows
  const wRow=$('#where'), tRow=$('#type');
  WHERES.forEach(w=>{const b=document.createElement('button');b.className='chip where';b.textContent=w;
    b.dataset.v=w;b.dataset.on=sel.where===w?'1':'0';
    b.onclick=()=>{sel.where=w;[...wRow.children].forEach(c=>c.dataset.on=c.dataset.v===w?'1':'0')};wRow.appendChild(b)});
  TYPES.forEach(([v,lab])=>{const b=document.createElement('button');b.className='chip type';b.textContent=lab;
    b.dataset.t=v;b.dataset.on=sel.type===v?'1':'0';
    b.onclick=()=>{sel.type=v;[...tRow.children].forEach(c=>c.dataset.on=c.dataset.t===v?'1':'0')};tRow.appendChild(b)});

  $('#hot').onclick=function(){sel.hot=!sel.hot;this.dataset.on=sel.hot?'1':'0';
    this.querySelector('.star').textContent=sel.hot?'★':'☆'};

  $('#save').onclick=function(){
    const name=$('#in-name').value.trim();
    if(!name){$('#in-name').focus();flash($('#in-name'));return}
    const rec={name, co:$('#in-co').value.trim(), where:sel.where, type:sel.type,
               note:$('#in-note').value.trim(), hot:sel.hot, ts:Date.now()};
    if(editId){const i=leads.findIndex(l=>l.id===editId);if(i>-1){rec.id=editId;rec.ts=leads[i].ts;leads[i]=rec}editId=null}
    else{rec.id='l'+Date.now()+Math.random().toString(36).slice(2,6);leads.unshift(rec)}
    save();resetForm();render();toast(editId?'Updated':'Logged ✓');
  };
  $('#cancel').onclick=()=>{editId=null;resetForm();render()};

  function resetForm(){
    $('#in-name').value='';$('#in-co').value='';$('#in-note').value='';
    sel={where:'Black Hat',type:'FTE',hot:false};
    [...wRow.children].forEach(c=>c.dataset.on=c.dataset.v==='Black Hat'?'1':'0');
    [...tRow.children].forEach(c=>c.dataset.on=c.dataset.t==='FTE'?'1':'0');
    $('#hot').dataset.on='0';$('#hot .star').textContent='☆';
    $('#save').textContent='Log it';$('#save').classList.remove('edit');$('#cancel').style.display='none';
    $('#lh').textContent='Logged';
  }
  function editLead(id){
    const l=leads.find(x=>x.id===id);if(!l)return;editId=id;
    $('#in-name').value=l.name;$('#in-co').value=l.co||'';$('#in-note').value=l.note||'';
    sel={where:l.where,type:l.type,hot:!!l.hot};
    [...wRow.children].forEach(c=>c.dataset.on=c.dataset.v===l.where?'1':'0');
    [...tRow.children].forEach(c=>c.dataset.on=c.dataset.t===l.type?'1':'0');
    $('#hot').dataset.on=l.hot?'1':'0';$('#hot .star').textContent=l.hot?'★':'☆';
    $('#save').textContent='Update';$('#save').classList.add('edit');$('#cancel').style.display='block';
    $('#lh').textContent='Editing';window.scrollTo({top:0,behavior:'smooth'});
  }
  function delLead(id){leads=leads.filter(l=>l.id!==id);save();render()}

  // filters
  const fRow=$('#filters');
  function buildFilters(){
    fRow.innerHTML='';
    const opts=['All','Hot',...TYPES.map(t=>t[0])];
    opts.forEach(o=>{const b=document.createElement('button');b.className='fchip';
      const lab=o==='All'?'All':o==='Hot'?'★ Hot':TYPELABEL[o];
      const n=o==='All'?leads.length:o==='Hot'?leads.filter(l=>l.hot).length:leads.filter(l=>l.type===o).length;
      b.textContent=lab+' '+n;b.dataset.on=filter===o?'1':'0';
      b.onclick=()=>{filter=o;render()};fRow.appendChild(b)});
  }

  function visible(){
    if(filter==='All')return leads;
    if(filter==='Hot')return leads.filter(l=>l.hot);
    return leads.filter(l=>l.type===filter);
  }

  function render(){
    $('#count').textContent=leads.length;
    buildFilters();
    const list=$('#list');const rows=visible();
    if(!leads.length){list.innerHTML='<div class="empty"><b>Nothing logged yet.</b><br>Tap a name in, pick the type, jot the one follow-up. Ten seconds, then back to the room.</div>';return}
    if(!rows.length){list.innerHTML='<div class="empty">No leads in this filter.</div>';return}
    list.innerHTML='';
    rows.forEach(l=>{
      const d=document.createElement('div');d.className='lead';d.dataset.t=l.type;
      d.innerHTML=`<button class="del" aria-label="Delete">✕</button>
        <div class="top"><div><div class="nm">${esc(l.name)}${l.hot?' <span class="starmark">★</span>':''}</div>
        ${l.co?`<div class="co">${esc(l.co)}</div>`:''}</div></div>
        ${l.note?`<div class="note">${esc(l.note)}</div>`:''}
        <div class="meta"><span class="tag" data-t="${l.type}">${TYPELABEL[l.type]}</span>
        <span class="where-tag">${esc(l.where)}</span></div>`;
      d.querySelector('.del').onclick=e=>{e.stopPropagation();delLead(l.id)};
      d.onclick=()=>editLead(l.id);
      list.appendChild(d);
    });
  }

  // export
  $('#copyBtn').onclick=()=>{
    if(!leads.length){toast('Nothing to copy yet');return}
    const txt=buildText();copy(txt).then(()=>toast('Copied — paste into email/notes')).catch(()=>toast('Copy failed'));
  };
  $('#csvBtn').onclick=()=>{
    if(!leads.length){toast('Nothing to export yet');return}
    const rows=[['Name','Company/Role','Type','Where','Note','Hot','Logged']];
    leads.forEach(l=>rows.push([l.name,l.co||'',TYPELABEL[l.type],l.where,l.note||'',l.hot?'HOT':'',
      new Date(l.ts).toLocaleString()]));
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download='summercamp-leads.csv';a.click();toast('CSV downloaded');
  };
  function buildText(){
    let out='SUMMER CAMP 2026 — FOLLOW-UP LIST ('+leads.length+' leads)\n';
    TYPES.forEach(([v,lab])=>{
      const g=leads.filter(l=>l.type===v);if(!g.length)return;
      out+='\n— '+lab.toUpperCase()+' —\n';
      g.forEach(l=>{out+='• '+l.name+(l.co?' — '+l.co:'')+(l.note?' — "'+l.note+'"':'')+
        ' ['+l.where+']'+(l.hot?' ★':'')+'\n'});
    });
    return out;
  }
  function copy(t){
    if(navigator.clipboard&&navigator.clipboard.writeText)return navigator.clipboard.writeText(t);
    return new Promise((res,rej)=>{const ta=document.createElement('textarea');ta.value=t;
      document.body.appendChild(ta);ta.select();try{document.execCommand('copy');res()}catch(e){rej()}
      document.body.removeChild(ta)});
  }

  function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  let tT;function toast(m){const el=$('#toast');el.textContent=m;el.classList.add('show');
    clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),1900)}
  function flash(el){el.style.borderColor='#8B1E24';setTimeout(()=>el.style.borderColor='',600)}

  render();
})();
</script>
</body>
</html>
